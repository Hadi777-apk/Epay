# ============================================
# 彩虹易支付 Nginx 配置
# ============================================

upstream php-upstream {
    server epay-php:9000;
}

server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 50m;

    # ==========================================
    # 安全响应头
    # ==========================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ==========================================
    # 安全规则：禁止直接访问核心目录
    # ==========================================
    location ^~ /includes {
        deny all;
        return 403;
    }

    location ^~ /plugins {
        deny all;
        return 403;
    }

    location ^~ /install {
        deny all;
        return 403;
    }

    # 保护敏感文件
    location ~* /(config\.php|\.htaccess|\.git) {
        deny all;
        return 403;
    }

    # ==========================================
    # URL 重写规则（对应 nginx.txt）
    # ==========================================
    location / {
        # *.html → index.php?mod=xxx
        if (!-e $request_filename) {
            rewrite ^/(.[a-zA-Z0-9\-\_]+).html$ /index.php?mod=$1 last;
        }
        # /pay/xxx → pay.php?s=xxx
        rewrite ^/pay/(.*)$ /pay.php?s=$1 last;
        # /api/xxx → api.php?s=xxx
        rewrite ^/api/(.*)$ /api.php?s=$1 last;
        # /doc/xxx.html → index.php?doc=xxx
        rewrite ^/doc/(.[a-zA-Z0-9\-\_]+).html$ /index.php?doc=$1 last;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # ==========================================
    # PHP 处理
    # ==========================================
    location ~ \.php$ {
        fastcgi_pass php-upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # 安全：防止上传文件被执行
        fastcgi_param PHP_VALUE "open_basedir=/var/www/html:/tmp/:/var/lib/php/sessions/";
    }

    # ==========================================
    # 静态资源缓存
    # ==========================================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================
    # 上传目录：禁止执行 PHP
    # ==========================================
    location /assets/uploads/ {
        location ~* \.php$ {
            deny all;
            return 403;
        }
    }

    # ==========================================
    # 日志
    # ==========================================
    access_log /var/log/nginx/epay-access.log;
    error_log /var/log/nginx/epay-error.log;
}
